name: my_perfect_quran
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  google_fonts: ^6.2.1
  qcf_quran: ^0.0.5
  flutter_screenutil: ^5.9.3
  window_manager: ^0.5.1
  just_audio: ^0.9.42
  just_audio_mpv: ^0.1.7
  sliding_up_panel: ^2.0.0+1
  camera: ^0.11.0+2
  image_cropper: ^8.0.0
  path_provider: ^2.1.2
  google_generative_ai: ^0.4.5
  flutter_dotenv: ^5.1.0
  image: ^4.2.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/translations/
  fonts:
    - family: Jameel Noori Nastaliq Kasheeda
      fonts:
        - asset: assets/fonts/jameel_noori_kasheeda.ttf